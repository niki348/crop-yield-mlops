# ============================================================
# Crop Yield MLOps — Central Configuration
# ============================================================

project:
  name: crop-yield-mlops
  version: "1.0"

paths:
  raw_data:        data/raw/crop_yield.csv
  processed_data:  data/processed/crop_yield_sampled.csv
  train_data:      data/processed/train.csv
  test_data:       data/processed/test.csv
  reference_data:  data/reference/reference.csv
  preprocessor:    models/preprocessor.pkl
  model:           models/model.pkl
  metrics:         metrics/metrics.json

data:
  sample_size: 100000
  random_state: 42
  test_size: 0.2
  categorical_cols:
    - Region
    - Soil_Type
    - Crop
    - Weather_Condition
    - Fertilizer_Used
    - Irrigation_Used
  numerical_cols:
    - Rainfall_mm
    - Temperature_Celsius
    - Days_to_Harvest
  target_col: Yield_tons_per_hectare

model:
  name: RandomForestRegressor
  registry_name: crop_yield_rf_predictor
  hyperparameters:
    n_estimators: 100
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: sqrt
    random_state: 42
    n_jobs: -1

mlflow:
  experiment_name: crop_yield_prediction
  tracking_uri: mlruns

thresholds:
  staging_r2:     0.88
  production_r2:  0.90
  production_mae: 0.50
  cv_folds: 5

optuna:
  n_trials: 30
  direction: minimize
  metric: mae

monitoring:
  drift_p_threshold: 0.05
  max_drifted_features: 2

api:
  host: 0.0.0.0
  port: 8000
  model_stage: Production
